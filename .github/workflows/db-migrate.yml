name: Database migrations

# Runs `supabase db push` against the production Supabase project
# whenever a merge to main touches supabase/migrations/. Catches the
# drift that bit us during the launch-readiness audit, where four
# migrations had landed in the repo without ever being applied to prod
# (add_stop_to_route_function broke Add Stop for every operator for 4
# days; copilot_action_acknowledgments + app_event_log_hash_chain
# never shipped at all).
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN  Personal access token from
#                          https://supabase.com/dashboard/account/tokens
#                          Needed for `supabase link`.
#   SUPABASE_PROJECT_REF   Project ref of the prod project (the
#                          subdomain bit of the project URL — for
#                          https://gotyqamdmjxadntkvhkk.supabase.co
#                          that's "gotyqamdmjxadntkvhkk").
#   SUPABASE_DB_PASSWORD   The database password. Reset under
#                          Settings → Database → Reset database
#                          password if you don't have it on file.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/db-migrate.yml'
  # Lets you re-run on demand if the secrets need rotating or a
  # previous run failed partway.
  workflow_dispatch:

# A failed/in-progress migration job and a new push to main racing
# would be very bad. Serialize: cancel-in-progress would lose state,
# so we queue instead.
concurrency:
  group: db-migrate-prod
  cancel-in-progress: false

jobs:
  push:
    name: supabase db push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to prod project
        # Capturing both stdout and stderr so a failing link step
        # surfaces in the job log (the CLI is otherwise quiet on
        # success and only prints to stderr on failure).
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link \
            --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}" \
            --password "$SUPABASE_DB_PASSWORD"

      - name: Show pending migrations
        # Dry-run preview so the job log records exactly what will be
        # applied, in order. If something looks wrong, cancel before
        # the next step.
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push --linked --dry-run

      - name: Apply migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push --linked
