  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

04a-4c85-4e2e-ad03-a209540f0698\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>:root {\n  /* Carnival Theme — warm orange-red brand */\n  --bg: #fffaf5;\n  --bg-alt: #fff3e8;\n  --surface: #ffffff;\n  --surface-muted: #fff1e8;\n  --border: #f0e0d0;\n  --border-strong: #e0cdbf;\n  --text: #2d1f14;\n  --text-soft: #6b5545;\n  --text-muted: #8a7565;\n  --primary: #e8590c;\n  --primary-strong: #d14e08;\n  --primary-light: #ff8c42;\n  --primary-bg: #fff1e8;\n  --primary-bg-subtle: #fff8f3;\n  --accent: #7c3aed;\n  --accent-light: #a78bfa;\n  --accent-bg: #f3f0ff;\n  --success: #16a34a;\n  --success-bg: #f0fdf4;\n  --warning: #d97706;\n  --warning-bg: #fffbeb;\n  --danger: #dc2626;\n  --danger-bg: #fef2f2;\n  --info: #0d9488;\n  --info-bg: #f0fdfa;\n  --shadow: 0 12px 30px rgba(45, 31, 20, 0.08);\n  --shadow-sm: 0 1px 3px rgba(45, 31, 20, 0.06);\n  --shadow-lg: 0 12px 40px rgba(45, 31, 20, 0.1);\n  --radius: 14px;\n  --radius-sm: 8px;\n  --radius-lg: 20px;\n}\n\n* {\n  box-sizing: border-box;\n}\n\nhtml {\n  scroll-behavior: smooth;\n}\n\nbody {\n  margin: 0;\n  font-family: \"Plus Jakarta Sans\", -apple-system, BlinkMacSystemFont, \"Segoe UI\", Arial, Helvetica,\n    sans-serif;\n  background: var(--bg);\n  color: var(--text);\n  line-height: 1.5;\n}\n\nh1, h2, h3, h4, h5, h6 {\n  font-family: \"Sora\", \"Plus Jakarta Sans\", -apple-system, BlinkMacSystemFont, sans-serif;\n}\n\na {\n  color: inherit;\n  text-decoration: none;\n}\n\nbutton,\ninput,\nselect,\ntextarea {\n  font: inherit;\n}\n\nimg {\n  max-width: 100%;\n  display: block;\n}\n\n.container {\n  width: min(1180px, calc(100% - 32px));\n  margin: 0 auto;\n}\n\n/* Topbar */\n.topbar {\n  position: sticky;\n  top: 0;\n  z-index: 50;\n  backdrop-filter: blur(10px);\n  background: rgba(255, 255, 255, 0.92);\n  border-bottom: 1px solid var(--border);\n}\n\n.topbar-inner {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  min-height: 72px;\n  gap: 20px;\n}\n\n.logo {\n  font-weight: 800;\n  font-size: 1.2rem;\n  letter-spacing: 0.01em;\n  color: var(--primary);\n}\n\n.nav-links {\n  display: flex;\n  align-items: center;\n  gap: 18px;\n  color: var(--text-soft);\n  font-size: 14px;\n  font-weight: 500;\n}\n\n.nav-links a:hover {\n  color: var(--primary);\n}\n\n/* Buttons */\n.primary-btn,\n.secondary-btn,\n.ghost-btn {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  border: none;\n  border-radius: 999px;\n  padding: 12px 20px;\n  cursor: pointer;\n  transition: 0.2s ease;\n  font-size: 14px;\n  font-weight: 600;\n}\n\n.primary-btn {\n  background: var(--primary);\n  color: white;\n}\n\n.primary-btn:hover {\n  background: var(--primary-strong);\n}\n\n.primary-btn:disabled {\n  opacity: 0.6;\n  cursor: not-allowed;\n}\n\n.secondary-btn {\n  background: var(--surface);\n  color: var(--text);\n  border: 1px solid var(--border);\n}\n\n.secondary-btn:hover {\n  border-color: var(--primary);\n  color: var(--primary);\n}\n\n.ghost-btn {\n  background: transparent;\n  color: var(--text-soft);\n}\n\n.ghost-btn:hover {\n  color: var(--primary);\n}\n\n/* Focus-visible styles for keyboard navigation */\n.primary-btn:focus-visible,\n.secondary-btn:focus-visible,\n.ghost-btn:focus-visible {\n  outline: 2px solid var(--primary);\n  outline-offset: 2px;\n}\n\na:focus-visible {\n  outline: 2px solid var(--primary);\n  outline-offset: 2px;\n  border-radius: 4px;\n}\n\n.mobile-menu-btn:focus-visible,\n.mobile-menu-close:focus-visible {\n  outline: 2px solid var(--primary);\n  outline-offset: 2px;\n}\n\n/* Hero */\n.hero {\n  padding: 56px 0 32px;\n}\n\n.hero-panel {\n  display: grid;\n  grid-template-columns: 1.2fr 0.8fr;\n  gap: 28px;\n  background: linear-gradient(135deg, #e8590c 0%, #ff8c42 100%);\n  color: white;\n  border-radius: 28px;\n  padding: 36px;\n  box-shadow: var(--shadow);\n}\n\n.hero h1 {\n  margin: 0 0 12px;\n  font-size: clamp(2rem, 4vw, 3.2rem);\n  line-height: 1.08;\n}\n\n.hero p {\n  margin: 0 0 22px;\n  color: rgba(255, 255, 255, 0.86);\n  max-width: 60ch;\n  line-height: 1.6;\n}\n\n/* Cards & Surfaces */\n.search-bar,\n.surface-card,\n.panel,\n.stat-card,\n.order-card,\n.delivery-card,\n.mobile-card,\n.product-card {\n  background: var(--surface);\n  border: 1px solid var(--border);\n  border-radius: var(--radius);\n  box-shadow: var(--shadow);\n}\n\n.search-bar {\n  display: grid;\n  grid-template-columns: repeat(4, 1fr);\n  gap: 10px;\n  padding: 12px;\n  margin-top: 22px;\n}\n\n.search-bar input,\n.search-bar select,\n.filters input,\n.filters select {\n  border: 1px solid var(--border);\n  border-radius: 12px;\n  min-height: 48px;\n  padding: 0 12px;\n  background: white;\n}\n\n/* Sections */\n.section {\n  padding: 34px 0;\n}\n\n.section-header {\n  display: flex;\n  align-items: end;\n  justify-content: space-between;\n  gap: 12px;\n  margin-bottom: 18px;\n  flex-wrap: wrap;\n  min-width: 0;\n}\n\n/* `display: flex` above wins over the [hidden] attribute's default\n   display: none, so opt-in callers that pass `hideHeader` to\n   DashboardShell need this explicit override.  Same CSS-specificity\n   trap as .sidebar-group-items[hidden] in PR #126. */\n.section-header[hidden] {\n  display: none;\n}\n\n.section-header > div:first-child {\n  min-width: 0;\n  flex: 1 1 0;\n}\n\n.section-header .action-row-inline {\n  flex-shrink: 0;\n}\n\n.section-header .action-row-inline > * {\n  white-space: nowrap;\n}\n\n.section-header h2 {\n  margin: 0;\n  font-size: 1.5rem;\n}\n\n.muted {\n  color: var(--text-soft);\n  font-size: 0.9rem;\n}\n\n/* Grids */\n.grid {\n  display: grid;\n  gap: 18px;\n}\n\n.grid-3 {\n  grid-template-columns: repeat(3, minmax(0, 1fr));\n}\n\n.grid-4 {\n  grid-template-columns: repeat(4, minmax(0, 1fr));\n}\n\n/* Product cards */\n.product-card {\n  overflow: hidden;\n  transition: transform 0.15s ease, box-shadow 0.15s ease;\n}\n\n.product-card:hover {\n  transform: translateY(-2px);\n  box-shadow: 0 16px 40px rgba(45, 31, 20, 0.12);\n}\n\n.product-media {\n  height: 200px;\n  overflow: hidden;\n  background: linear-gradient(135deg, #fff1e8, #fff8f3);\n}\n\n.product-media-img {\n  width: 100%;\n  height: 100%;\n  object-fit: cover;\n  object-position: center;\n  transition: transform 0.3s ease;\n}\n\n.product-card:hover .product-media-img {\n  transform: scale(1.05);\n}\n\n.product-card-unavailable {\n  opacity: 0.6;\n}\n\n.product-card-unavailable:hover {\n  transform: none;\n  box-shadow: var(--shadow);\n}\n\n.product-card-unavailable .product-media-img {\n  filter: grayscale(0.5);\n}\n\n.product-copy {\n  padding: 16px;\n}\n\n/* Typography */\n.kicker {\n  color: var(--primary);\n  font-size: 0.78rem;\n  font-weight: 700;\n  text-transform: uppercase;\n  letter-spacing: 0.05em;\n}\n\n.price-row {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  gap: 12px;\n  margin-top: 12px;\n}\n\n.action-row,\n.action-row-inline {\n  display: flex;\n  align-items: center;\n  gap: 12px;\n  flex-wrap: wrap;\n}\n\n.action-row {\n  justify-content: center;\n}\n\n.action-row-inline {\n  justify-content: flex-start;\n}\n\n.action-row-end {\n  margin-top: 14px;\n  display: flex;\n  justify-content: flex-end;\n}\n\n.two-col-responsive {\n  grid-template-columns: repeat(2, minmax(0, 1fr));\n}\n\n.card-header-wrap {\n  flex-wrap: wrap;\n}\n\n.card-title-tight {\n  margin: 8px 0 4px;\n}\n\n.page-title {\n  margin: 6px 0 8px;\n}\n\n.page-title-sm {\n  margin: 6px 0 0;\n}\n\n.field-stack {\n  display: grid;\n  gap: 4px;\n}\n\n.inline-form-actions {\n  display: flex;\n  gap: 8px;\n  flex-wrap: wrap;\n}\n\n.domain-slug-row {\n  display: flex;\n  align-items: center;\n  gap: 4px;\n}\n\n.domain-slug-row input {\n  width: 180px;\n  min-width: 0;\n}\n\n.domain-url-row {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  flex-wrap: wrap;\n}\n\n.stack-gap-xs {\n  margin-top: 10px;\n}\n\n.stack-gap-sm {\n  margin-top: 16px;\n}\n\n.stack-gap-md {\n  margin-top: 18px;\n}\n\n.centered-stack-lg {\n  text-align: center;\n  margin-bottom: 32px;\n}\n\n/* Badges */\n.badge {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  padding: 6px 10px;\n  border-radius: 999px;\n  background: #fdeee3;\n  color: var(--primary);\n  font-size: 12px;\n  font-weight: 700;\n  white-space: nowrap;\n}\n\n.badge.success {\n  background: #eaf9f4;\n  color: #188862;\n}\n\n.badge.warning {\n  background: #fff4e5;\n  color: #a86a08;\n}\n\n.badge.danger {\n  background: #fef2f2;\n  color: #b91c1c;\n}\n\n.badge.danger {\n  background: #fdeaea;\n  color: #c33;\n}\n\n/* Layouts */\n.two-col {\n  display: grid;\n  grid-template-columns: 1.1fr 0.9fr;\n  gap: 24px;\n}\n\n.page {\n  padding: 28px 0 48px;\n}\n\n/* Legal content */\n/* Contact form */\n.contact-form {\n  display: grid;\n  gap: 14px;\n}\n\n.contact-form textarea {\n  border: 1px solid var(--border);\n  border-radius: 12px;\n  padding: 10px 12px;\n  background: white;\n  font: inherit;\n  transition: border-color 0.15s ease;\n}\n\n.contact-form textarea:focus {\n  outline: none;\n  border-color: var(--primary);\n  box-shadow: 0 0 0 3px rgba(232, 89, 12, 0.1);\n}\n\n.legal-content h2 {\n  font-size: 1.15rem;\n  margin: 28px 0 10px;\n  color: var(--text);\n}\n\n.legal-content p {\n  color: var(--text-soft);\n  line-height: 1.7;\n  margin: 0 0 12px;\n}\n\n.legal-content ul {\n  color: var(--text-soft);\n  line-height: 1.7;\n  margin: 0 0 12px;\n  padding-left: 24px;\n}\n\n.legal-content li {\n  margin-bottom: 6px;\n}\n\n.filters {\n  display: grid;\n  grid-template-columns: repeat(5, minmax(0, 1fr));\n  gap: 10px;\n  margin-bottom: 18px;\n}\n\n.panel {\n  padding: 20px;\n}\n\n/* Dashboard sidebar */\n.sidebar-layout {\n  display: grid;\n  grid-template-columns: 260px 1fr;\n  min-height: 100vh;\n}\n\n.sidebar {\n  background: var(--surface, #ffffff);\n  color: var(--text, #2d1f14);\n  padding: 24px 18px;\n  display: flex;\n  flex-direction: column;\n  /* Stick the sidebar to the top of the viewport with its own internal\n     scroll, so Help Center / Sign Out never clip below the fold even on\n     short displays.  align-self: start prevents the grid from stretching\n     the sidebar to match main-content height. */\n  position: sticky;\n  top: 0;\n  align-self: start;\n  height: 100vh;\n  max-height: 100vh;\n  border-right: 1px solid var(--border, #f0e0d0);\n}\n\n.dashboard-mobile-bar {\n  display: none;\n  align-items: center;\n  justify-content: space-between;\n  gap: 10px;\n  margin-bottom: 14px;\n}\n\n.dashboard-mobile-menu-btn {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  border: 1px solid var(--border);\n  border-radius: 12px;\n  min-height: 40px;\n  padding: 0 12px;\n  background: white;\n  color: var(--text);\n  cursor: pointer;\n}\n\n.dashboard-mobile-menu-btn:focus-visible {\n  outline: 2px solid var(--primary);\n  outline-offset: 2px;\n}\n\n.dashboard-mobile-drawer .mobile-menu-nav a {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n}\n\n.dashboard-mobile-drawer .mobile-menu-nav a.active {\n  color: var(--primary);\n  background: var(--surface-muted);\n}\n\n.dashboard-nav-badge {\n  background: #ef4444;\n  color: #fff;\n  font-size: 11px;\n  font-weight: 700;\n  padding: 1px 7px;\n  border-radius: 999px;\n  line-height: 18px;\n}\n\n.dashboard-desktop-notifications {\n  display: block;\n}\n\n/* When the page renders its own headline (hideHeader=true) the bell\n   floats top-right of the main column so it stays reachable. */\n.dashboard-desktop-notifications--floating {\n  display: flex;\n  justify-content: flex-end;\n  margin: 0 0 12px;\n}\n\n.sidebar a {\n  display: block;\n  padding: 11px 14px;\n  border-radius: 12px;\n  margin-bottom: 2px;\n  font-size: 14px;\n  color: var(--text-soft, #6b5545);\n  transition: 0.15s ease;\n}\n\n.sidebar a:hover {\n  background: var(--primary-bg-subtle, #fff8f3);\n  color: var(--text, #2d1f14);\n}\n\n.sidebar a.active {\n  background: var(--primary-bg, #fff1e8);\n  color: var(--primary, #e8590c);\n  font-weight: 600;\n}\n\n/* ── Grouped sidebar (operator nav, Linear/Notion-style collapsible groups) ── */\n\n.sidebar-search-trigger {\n  display: flex;\n  align-items: center;\n  gap: 9px;\n  width: 100%;\n  margin: 0 0 8px;\n  padding: 9px 12px;\n  border: 1px solid var(--border, #f0e0d0);\n  border-radius: 12px;\n  background: var(--surface-muted, #fff1e8);\n  color: var(--text-soft, #6b5545);\n  font: inherit;\n  font-size: 13.5px;\n  cursor: pointer;\n  text-align: left;\n  transition: background 0.15s ease, border-color 0.15s ease;\n}\n\n.sidebar-search-trigger:hover,\n.sidebar-search-trigger:focus-visible {\n  background: var(--primary-bg-subtle, #fff8f3);\n  border-color: var(--border-strong, #e0cdbf);\n  outline: none;\n}\n\n.sidebar-search-placeholder {\n  flex: 1;\n}\n\n.sidebar-search-shortcut {\n  font-size: 11px;\n  padding: 2px 6px;\n  border-radius: 6px;\n  background: var(--border, #f0e0d0);\n  color: var(--text-muted, #8a7565);\n  letter-spacing: 0.02em;\n}\n\n/* Ask AI is a visible affordance, but it should not be louder than the\n   active-page highlight.  Solid muted-orange background, no gradient\n   pop, no drop-shadow.  The brightest signal in the sidebar stays on\n   the currently-active nav item. */\n.sidebar-ask-ai {\n  display: flex;\n  align-items: center;\n  gap: 9px;\n  width: 100%;\n  margin: 0 0 18px;\n  padding: 11px 14px;\n  border: 1px solid rgba(232, 89, 12, 0.35);\n  border-radius: 12px;\n  background: var(--primary-bg, #fff1e8);\n  color: var(--primary, #e8590c);\n  font: inherit;\n  font-size: 14px;\n  font-weight: 600;\n  cursor: pointer;\n  text-align: left;\n  transition: background 0.15s ease, border-color 0.15s ease;\n}\n\n.sidebar-ask-ai:hover,\n.sidebar-ask-ai:focus-visible {\n  background: rgba(232, 89, 12, 0.18);\n  border-color: rgba(232, 89, 12, 0.55);\n  outline: none;\n}\n\n/* The scrollable middle of the sidebar.  flex:1 takes whatever vertical\n   space is left after the pinned-top affordances (logo/search/Ask AI)\n   and the pinned-bottom footer (Language/Public Site/Sign Out).\n   min-height:0 lets the flex child shrink so overflow-y kicks in. */\n.sidebar-nav-body {\n  display: flex;\n  flex-direction: column;\n  flex: 1 1 auto;\n  overflow-y: auto;\n  min-height: 0;\n  /* Slim scrollbar so it doesn't crowd the layout. */\n  scrollbar-width: thin;\n  scrollbar-color: var(--border, #f0e0d0) transparent;\n}\n.sidebar-nav-body::-webkit-scrollbar {\n  width: 6px;\n}\n.sidebar-nav-body::-webkit-scrollbar-thumb {\n  background: var(--border, #f0e0d0);\n  border-radius: 99px;\n}\n\n.sidebar-group {\n  margin-top: 14px;\n}\n\n.sidebar-group:first-child {\n  margin-top: 6px;\n}\n\n.sidebar-group-header {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  width: 100%;\n  padding: 6px 14px 8px;\n  background: transparent;\n  border: none;\n  color: var(--text-muted, #8a7565);\n  font: inherit;\n  font-size: 12px;\n  font-weight: 700;\n  text-transform: uppercase;\n  letter-spacing: 0.1em;\n  cursor: pointer;\n}\n\n.sidebar-group-header:hover,\n.sidebar-group-header:focus-visible {\n  color: var(--text, #2d1f14);\n  outline: none;\n}\n\n/* When the active route lives inside a group, the group is force-expanded\n   and the click is a no-op.  Reflect that visually so the operator\n   doesn't try to collapse a group that doesn't move. */\n.sidebar-group-header[data-locked=\"true\"] {\n  cursor: default;\n  color: var(--text-soft, #6b5545);\n}\n.sidebar-group-header[data-locked=\"true\"]:hover {\n  color: var(--text-soft, #6b5545);\n}\n\n.sidebar-group-chevron {\n  font-size: 10px;\n  color: var(--text-muted, #8a7565);\n  margin-left: 6px;\n}\n.sidebar-group-header[data-locked=\"true\"] .sidebar-group-chevron {\n  /* Active group is always open — no chevron needed.  Hide it so the\n     header reads as a section label, not a toggle. */\n  display: none;\n}\n\n.sidebar-group-items {\n  display: flex;\n  flex-direction: column;\n}\n\n/* `display: flex` above wins over the [hidden] attribute's default\n   `display: none`, so we need an explicit override for the collapsed\n   state — otherwise clicking a group header toggles the chevron but\n   leaves the items visible. */\n.sidebar-group-items[hidden] {\n  display: none;\n}\n\n.sidebar-group-trailing {\n  margin-top: 18px;\n}\n\n.sidebar-group-footer {\n  margin-top: 8px;\n}\n\n.sidebar-search-trigger--mobile {\n  background: rgba(0, 0, 0, 0.04);\n  border-color: var(--border, #e5e7eb);\n  color: var(--text-muted, #6b7280);\n}\n\n.main-shell {\n  padding: 28px;\n  overflow-y: auto;\n}\n\n/* Stats */\n.stats-row {\n  display: grid;\n  grid-template-columns: repeat(4, minmax(0, 1fr));\n  gap: 16px;\n}\n\n.stat-card {\n  padding: 18px;\n}\n\n.stat-card strong {\n  display: block;\n  font-size: 1.75rem;\n  margin-top: 8px;\n}\n\n/* Dashboard */\n.dashboard-grid {\n  display: grid;\n  grid-template-columns: 1.3fr 0.7fr;\n  gap: 18px;\n  margin-top: 18px;\n}\n\n.list {\n  display: grid;\n  gap: 12px;\n}\n\n.order-card,\n.delivery-card,\n.mobile-card {\n  padding: 16px;\n}\n\n.order-card:hover {\n  border-color: var(--primary);\n}\n\n.order-row,\n.delivery-row {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  gap: 12px;\n}\n\n/* Delivery board */\n.delivery-board {\n  display: grid;\n  grid-template-columns: 1.1fr 0.9fr;\n  gap: 18px;\n}\n\n.board-columns {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 14px;\n}\n\n.column {\n  background: var(--surface-muted);\n  border-radius: 18px;\n  padding: 14px;\n  min-height: 420px;\n}\n\n.column h3 {\n  margin: 0 0 12px;\n  font-size: 1rem;\n}\n\n.map-card {\n  min-height: 420px;\n  background: linear-gradient(180deg, #fff1e8 0%, #fdeee3 100%);\n  border: 1px solid var(--border);\n  border-radius: 18px;\n  padding: 18px;\n}\n\n/* Mobile crew */\n.mobile-frame {\n  width: min(420px, 100%);\n  margin: 0 auto;\n  background: #2d1f14;\n  padding: 18px;\n  border-radius: 28px;\n}\n\n.mobile-screen {\n  background: white;\n  border-radius: 20px;\n  padding: 16px;\n}\n\n/* Footer */\n.footer {\n  padding: 28px 0 48px;\n  color: var(--text-soft);\n}\n\n/* Form inputs */\ninput[type=\"text\"],\ninput[type=\"email\"],\ninput[type=\"tel\"],\ninput[type=\"number\"],\ninput[type=\"password\"],\ninput[type=\"date\"],\ninput[type=\"time\"],\nselect,\ntextarea {\n  border: 1px solid var(--border);\n  border-radius: 12px;\n  min-height: 44px;\n  padding: 8px 12px;\n  background: white;\n  transition: border-color 0.15s ease;\n}\n\ninput:focus,\nselect:focus,\ntextarea:focus {\n  outline: none;\n  border-color: var(--primary);\n  box-shadow: 0 0 0 3px rgba(232, 89, 12, 0.1);\n}\n\n/* Field-level validation errors */\ninput[aria-invalid=\"true\"],\nselect[aria-invalid=\"true\"],\ntextarea[aria-invalid=\"true\"] {\n  border-color: var(--danger);\n  box-shadow: 0 0 0 3px rgba(223, 76, 76, 0.1);\n}\n\n.field-error {\n  margin-top: 6px;\n  font-size: 13px;\n  color: var(--danger);\n  line-height: 1.35;\n}\n\n/* Loading spinner */\n.loading-spinner {\n  display: flex;\n  justify-content: center;\n  align-items: center;\n  min-height: 200px;\n  color: var(--text-soft);\n}\n\n/* Breadcrumbs */\n.breadcrumbs {\n  margin-bottom: 16px;\n}\n\n.breadcrumbs-list {\n  list-style: none;\n  margin: 0;\n  padding: 0;\n  display: flex;\n  align-items: center;\n  gap: 2px;\n  flex-wrap: wrap;\n}\n\n.breadcrumbs-item {\n  display: flex;\n  align-items: center;\n  gap: 2px;\n  font-size: 0.8rem;\n  line-height: 1;\n}\n\n.breadcrumbs-chevron {\n  color: var(--text-soft);\n  opacity: 0.5;\n  flex-shrink: 0;\n}\n\n.breadcrumbs-link {\n  color: var(--text-soft);\n  text-decoration: none;\n  padding: 2px 4px;\n  border-radius: 6px;\n  transition: color 0.15s ease, background 0.15s ease;\n}\n\n.breadcrumbs-link:hover {\n  color: var(--primary);\n  background: rgba(232, 89, 12, 0.06);\n}\n\n.breadcrumbs-current {\n  color: var(--text);\n  font-weight: 600;\n  padding: 2px 4px;\n}\n\n/* Empty state */\n.empty-state {\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  text-align: center;\n  padding: 48px 24px;\n}\n\n.empty-state-illustration {\n  margin-bottom: 20px;\n}\n\n.empty-state-title {\n  margin: 0 0 8px;\n  font-size: 1.15rem;\n  font-weight: 600;\n  color: var(--text);\n}\n\n.empty-state-description {\n  margin: 0 0 20px;\n  color: var(--text-soft);\n  font-size: 0.9rem;\n  max-width: 40ch;\n  line-height: 1.6;\n}\n\n/* Responsive */\n@media (max-width: 980px) {\n  .hero-panel,\n  .two-col,\n  .dashboard-grid,\n  .delivery-board {\n    grid-template-columns: 1fr;\n  }\n\n  .stats-row,\n  .grid-4,\n  .grid-3,\n  .search-bar,\n  .filters,\n  .board-columns {\n    grid-template-columns: 1fr 1fr;\n  }\n\n  .dashboard-sidebar-desktop {\n    display: none;\n  }\n\n  .sidebar-layout {\n    grid-template-columns: 1fr;\n    min-height: auto;\n  }\n\n  .main-shell {\n    padding: 20px;\n  }\n\n  .dashboard-mobile-bar {\n    display: flex;\n  }\n\n  .dashboard-desktop-notifications,\n  .dashboard-desktop-notifications--floating {\n    display: none;\n  }\n\n  .action-row {\n    justify-content: flex-start;\n  }\n\n  .action-row-end {\n    justify-content: flex-start;\n  }\n\n  .order-row,\n  .delivery-row,\n  .price-row {\n    flex-wrap: wrap;\n    align-items: flex-start;\n  }\n\n  .two-col-responsive {\n    grid-template-columns: 1fr;\n  }\n\n  .stat-grid-responsive {\n    grid-template-columns: repeat(2, minmax(0, 1fr));\n  }\n}\n\n@media (max-width: 640px) {\n  .container {\n    width: min(100% - 20px, 100%);\n  }\n\n  .topbar-inner,\n  .nav-links,\n  .search-bar,\n  .filters,\n  .stats-row,\n  .grid-4,\n  .grid-3,\n  .board-columns {\n    grid-template-columns: 1fr;\n    display: grid;\n  }\n\n  .nav-links {\n    gap: 10px;\n  }\n\n  .hero-panel {\n    padding: 18px;\n  }\n\n  .main-shell {\n    padding: 14px;\n  }\n\n  .action-row,\n  .action-row-inline {\n    flex-direction: column;\n    align-items: stretch;\n  }\n\n  .action-row > *,\n  .action-row-inline > * {\n    width: 100%;\n    white-space: normal;\n  }\n\n  .inline-form-actions {\n    flex-direction: column;\n  }\n\n  .inline-form-actions > * {\n    width: 100%;\n  }\n\n  .domain-slug-row {\n    flex-wrap: wrap;\n  }\n\n  .domain-slug-row input {\n    width: 100%;\n  }\n\n  .stat-grid-responsive {\n    grid-template-columns: 1fr;\n  }\n\n  .card-header-wrap .badge {\n    white-space: normal;\n  }\n}\n\n/* Storefront realignment */\n\n.public-topbar {\n  background: rgba(255, 255, 255, 0.82);\n  backdrop-filter: blur(14px);\n}\n\n.public-logo {\n  color: var(--primary);\n  font-size: 1.15rem;\n}\n\n.public-nav-links {\n  gap: 22px;\n}\n\n.public-nav-right {\n  display: flex;\n  align-items: center;\n  gap: 12px;\n}\n\n.public-nav-auth-btn {\n  font-size: 14px;\n}\n\n.public-nav-book-btn {\n  background: var(--primary);\n  min-height: 42px;\n}\n\n.saas-header {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  gap: 12px;\n}\n\n.saas-header-nav {\n  display: flex;\n  gap: 16px;\n  align-items: center;\n}\n\n/* Mobile-only header slot (language switcher + hamburger).\n   Hidden on desktop — desktop nav has its own switcher. */\n.mobile-header-controls {\n  display: none;\n  align-items: center;\n  gap: 6px;\n}\n\n/* Mobile menu — hamburger button hidden on desktop */\n.mobile-menu-btn {\n  display: none;\n  align-items: center;\n  justify-content: center;\n  width: 44px;\n  height: 44px;\n  padding: 0;\n  border: none;\n  border-radius: 10px;\n  background: transparent;\n  color: var(--text);\n  cursor: pointer;\n  -webkit-tap-highlight-color: transparent;\n}\n\n.mobile-menu-btn:hover {\n  background: var(--surface-muted);\n}\n\n.mobile-menu-overlay {\n  position: fixed;\n  inset: 0;\n  z-index: 1200;\n  background: rgba(45, 31, 20, 0.4);\n  backdrop-filter: blur(4px);\n  animation: mobile-menu-fade-in 0.15s ease;\n  isolation: isolate;\n}\n\n@keyframes mobile-menu-fade-in {\n  from { opacity: 0; }\n  to   { opacity: 1; }\n}\n\n.mobile-menu-drawer {\n  position: fixed;\n  top: 0;\n  right: 0;\n  width: min(320px, 85vw);\n  height: 100vh;\n  height: 100dvh;\n  background: var(--surface);\n  box-shadow: -8px 0 32px rgba(45, 31, 20, 0.12);\n  display: flex;\n  flex-direction: column;\n  animation: mobile-menu-slide-in 0.2s ease;\n  max-height: 100dvh;\n  padding-top: env(safe-area-inset-top, 0);\n  padding-bottom: env(safe-area-inset-bottom, 0);\n}\n\n@keyframes mobile-menu-slide-in {\n  from { transform: translateX(100%); }\n  to   { transform: translateX(0); }\n}\n\n.mobile-menu-header {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  padding: 16px 20px;\n  border-bottom: 1px solid var(--border);\n  flex-shrink: 0;\n}\n\n.mobile-menu-title {\n  font-weight: 700;\n  font-size: 1rem;\n  color: var(--text);\n}\n\n.mobile-menu-close {\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  width: 40px;\n  height: 40px;\n  padding: 0;\n  border: none;\n  border-radius: 10px;\n  background: transparent;\n  color: var(--text-soft);\n  cursor: pointer;\n}\n\n.mobile-menu-close:hover {\n  background: var(--surface-muted);\n  color: var(--text);\n}\n\n.mobile-menu-nav {\n  display: flex;\n  flex-direction: column;\n  flex: 1;\n  padding: 12px 0;\n  overflow-y: auto;\n}\n\n.mobile-menu-nav a {\n  display: block;\n  padding: 14px 24px;\n  font-size: 15px;\n  font-weight: 500;\n  color: var(--text);\n  transition: background 0.15s ease;\n}\n\n.mobile-menu-nav a:hover {\n  background: var(--surface-muted);\n  color: var(--primary);\n}\n\n.mobile-menu-footer {\n  display: flex;\n  flex-direction: column;\n  gap: 10px;\n  padding: 16px 20px calc(24px + env(safe-area-inset-bottom, 0));\n  border-top: 1px solid var(--border);\n  flex-shrink: 0;\n}\n\n.mobile-menu-cta {\n  width: 100%;\n  min-height: 48px;\n  background: var(--primary);\n  text-align: center;\n}\n\n.public-status-pill {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  min-height: 42px;\n  padding: 0 14px;\n  border-radius: 999px;\n  background: rgba(232, 89, 12, 0.08);\n  border: 1px solid rgba(232, 89, 12, 0.12);\n  color: var(--primary);\n  font-size: 13px;\n  font-weight: 700;\n  white-space: nowrap;\n}\n\n.public-hero {\n  position: relative;\n  min-height: 600px;\n  display: flex;\n  align-items: center;\n  overflow: hidden;\n}\n\n.public-hero > .container {\n  position: relative;\n  z-index: 2;\n}\n\n.public-hero-overlay {\n  position: absolute;\n  inset: 0;\n  z-index: 1;\n  background: linear-gradient(\n    90deg,\n    rgba(255, 255, 255, 0.97) 0%,\n    rgba(255, 255, 255, 0.92) 30%,\n    rgba(255, 255, 255, 0.6) 55%,\n    rgba(255, 255, 255, 0.15) 75%,\n    transparent 100%\n  );\n}\n\n.public-hero-copy {\n  position: relative;\n  z-index: 3;\n  width: min(680px, 100%);\n  padding: 48px 0;\n  background: rgba(255, 255, 255, 0.35);\n  backdrop-filter: blur(4px);\n  border-radius: 28px;\n  padding: 42px 38px;\n  margin: 24px 0;\n}\n\n.public-hero-copy h1 {\n  margin: 8px 0 14px;\n  font-size: clamp(2.8rem, 5vw, 4.5rem);\n  line-height: 0.96;\n  color: var(--text);\n  font-weight: 900;\n  letter-spacing: -0.03em;\n  text-shadow: 0 1px 0 rgba(255, 255, 255, 0.45);\n}\n\n.public-hero-copy p {\n  margin: 0;\n  max-width: 56ch;\n  color: var(--text-soft);\n  font-size: 1.05rem;\n  line-height: 1.65;\n  font-weight: 500;\n}\n\n.public-kicker {\n  color: var(--primary);\n}\n\n.storefront-search-card {\n  margin-top: 24px;\n  max-width: 920px;\n  background: rgba(255, 255, 255, 0.96);\n  border: 1px solid rgba(255, 255, 255, 0.92);\n  border-radius: 24px;\n  box-shadow: 0 18px 38px rgba(45, 31, 20, 0.14);\n  padding: 16px;\n  backdrop-filter: blur(10px);\n}\n\n.storefront-search-grid {\n  display: grid;\n  grid-template-columns: repeat(4, minmax(0, 1fr));\n  gap: 12px;\n  align-items: end;\n}\n\n.storefront-field {\n  display: grid;\n  gap: 6px;\n  min-width: 0;\n}\n\n.storefront-field span {\n  color: var(--text-soft);\n  font-size: 12px;\n  font-weight: 700;\n}\n\n.storefront-field input,\n.storefront-field select {\n  width: 100%;\n}\n\n.storefront-search-btn {\n  grid-column: 1 / -1;\n  width: 100%;\n  min-height: 54px;\n  background: var(--primary);\n}\n\n.storefront-search-btn:hover {\n  filter: brightness(0.9);\n}\n\n.team-invite-grid {\n  display: grid;\n  grid-template-columns: minmax(0, 1fr) auto auto;\n  gap: 10px;\n  align-items: end;\n}\n\n.team-invite-submit {\n  min-height: 48px;\n}\n\n.public-hero-visual {\n  position: absolute;\n  inset: 0;\n  z-index: 0;\n}\n\n.public-hero-photo {\n  position: absolute;\n  inset: 0;\n  width: 100%;\n  height: 100%;\n  object-fit: cover;\n  object-position: center 38%;\n}\n\n.storefront-section-soft {\n  background: linear-gradient(\n    180deg,\n    rgba(255, 255, 255, 0.5),\n    rgba(237, 244, 255, 0.72)\n  );\n}\n\n/* Trust bar */\n.trust-bar-section {\n  background: white;\n  border-top: 1px solid var(--border);\n  border-bottom: 1px solid var(--border);\n  padding: 28px 0;\n}\n\n.trust-bar-heading {\n  text-align: center;\n  font-size: 1.1rem;\n  font-weight: 800;\n  color: var(--text);\n  margin: 0 0 22px;\n}\n\n.trust-items {\n  display: flex;\n  justify-content: center;\n  flex-wrap: wrap;\n  gap: 28px 40px;\n}\n\n.trust-item {\n  display: flex;\n  align-items: center;\n  gap: 12px;\n}\n\n.trust-icon {\n  width: 48px;\n  height: 48px;\n  border-radius: 50%;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  font-size: 22px;\n  flex-shrink: 0;\n}\n\n.trust-item-text strong {\n  display: block;\n  font-size: 13px;\n  font-weight: 700;\n  color: var(--text);\n}\n\n.trust-item-text span {\n  font-size: 12px;\n  color: var(--text-soft);\n}\n\n/* Category photo cards */\n.category-photo-grid {\n  display: grid;\n  grid-template-columns: repeat(4, minmax(0, 1fr));\n  gap: 18px;\n}\n\n.category-photo-card {\n  border-radius: 20px;\n  overflow: hidden;\n  background: white;\n  border: 1px solid var(--border);\n  box-shadow: var(--shadow);\n  transition: transform 0.15s ease, box-shadow 0.15s ease;\n  text-decoration: none;\n  color: inherit;\n  display: block;\n}\n\n.category-photo-card:hover {\n  transform: translateY(-4px);\n  box-shadow: 0 22px 50px rgba(45, 31, 20, 0.14);\n}\n\n.category-photo-img {\n  height: 190px;\n  overflow: hidden;\n  background-color: #fff1e8;\n  background-image: linear-gradient(135deg, #fff1e8, #fff8f3);\n}\n\n.category-photo-img-el {\n  width: 100%;\n  height: 100%;\n  object-fit: cover;\n  object-position: center;\n  transition: transform 0.3s ease;\n}\n\n.category-photo-card:hover .category-photo-img-el {\n  transform: scale(1.05);\n}\n\n.category-photo-body {\n  padding: 16px;\n}\n\n.category-photo-body h3 {\n  margin: 0 0 4px;\n  font-size: 1rem;\n  font-weight: 700;\n}\n\n.category-starting-price {\n  color: var(--text-soft);\n  font-size: 13px;\n}\n\n/* Pain section */\n.pain-section {\n  background: var(--surface-muted);\n}\n\n.pain-grid {\n  display: grid;\n  grid-template-columns: repeat(2, 1fr);\n  gap: 16px;\n  max-width: 820px;\n  margin: 0 auto;\n}\n\n.pain-card {\n  display: flex;\n  align-items: center;\n  gap: 14px;\n  background: white;\n  border: 1px solid var(--border);\n  border-radius: 16px;\n  padding: 18px 20px;\n}\n\n.pain-before {\n  display: flex;\n  align-items: center;\n  gap: 8px;\n  font-size: 0.9rem;\n  color: var(--text-muted);\n  text-decoration: line-through;\n  flex: 1;\n}\n\n.pain-arrow {\n  flex-shrink: 0;\n}\n\n.pain-after {\n  display: flex;\n  align-items: center;\n  gap: 8px;\n  font-size: 0.9rem;\n  font-weight: 600;\n  color: var(--text);\n  flex: 1;\n}\n\n/* Benefits section */\n.benefits-section {\n  background: white;\n}\n\n.benefit-card {\n  text-align: center;\n  padding: 32px 24px;\n}\n\n.benefit-icon {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  width: 56px;\n  height: 56px;\n  border-radius: 16px;\n  background: var(--surface-muted);\n  color: var(--primary);\n}\n\n/* Feature showcase */\n.feature-showcase-list {\n  display: flex;\n  flex-direction: column;\n  gap: 36px;\n}\n\n.feature-showcase-row {\n  display: flex;\n  gap: 32px;\n  align-items: center;\n}\n\n.feature-showcase-copy {\n  flex: 1;\n  min-width: 0;\n}\n\n.feature-visual {\n  flex: 1;\n  border-radius: 20px;\n  padding: 32px;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n}\n\n.feature-mockup {\n  width: 280px;\n  background: white;\n  border-radius: 12px;\n  box-shadow: 0 12px 32px rgba(0, 0, 0, 0.1);\n  overflow: hidden;\n}\n\n.feature-mockup-bar {\n  display: flex;\n  gap: 5px;\n  padding: 8px 10px;\n  background: #f4f6f8;\n  border-bottom: 1px solid #e8ecf0;\n}\n\n.feature-mockup-bar span {\n  width: 8px;\n  height: 8px;\n  border-radius: 50%;\n  background: #d0d5dd;\n}\n\n.feature-mockup-body {\n  padding: 10px;\n}\n\n/* Integrations */\n.integrations-section {\n  background: var(--surface-muted);\n}\n\n.integrations-grid {\n  display: flex;\n  justify-content: center;\n  flex-wrap: wrap;\n  gap: 24px 40px;\n}\n\n.integration-item {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  padding: 14px 20px;\n  background: white;\n  border: 1px solid var(--border);\n  border-radius: 14px;\n}\n\n/* FAQ */\n.faq-list {\n  max-width: 720px;\n  margin: 0 auto;\n}\n\n.faq-item {\n  border-bottom: 1px solid var(--border);\n}\n\n.faq-item:first-child {\n  border-top: 1px solid var(--border);\n}\n\n.faq-trigger {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  width: 100%;\n  padding: 18px 0;\n  background: none;\n  border: none;\n  cursor: pointer;\n  font-size: 1rem;\n  font-weight: 600;\n  color: var(--text);\n  text-align: left;\n  gap: 16px;\n}\n\n.faq-trigger:hover {\n  color: var(--primary);\n}\n\n.faq-answer {\n  padding: 0 0 18px;\n}\n\n.faq-answer p {\n  margin: 0;\n  color: var(--text-soft);\n  line-height: 1.65;\n  font-size: 0.95rem;\n}\n\n/* Final CTA */\n.final-cta-section {\n  padding: 0;\n}\n\n.final-cta-card {\n  text-align: center;\n  padding: 56px 32px;\n  border-radius: 28px;\n  background: linear-gradient(135deg, #2d1f14 0%, #e8590c 100%);\n  box-shadow: 0 24px 48px rgba(45, 31, 20, 0.25);\n}\n\n/* Footer grid */\n.footer-grid {\n  display: grid;\n  grid-template-columns: 1.4fr 1fr 1fr 1fr;\n  gap: 32px;\n}\n\n.footer-bottom {\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  margin-top: 24px;\n  padding-top: 18px;\n  border-top: 1px solid var(--border);\n}\n\n.footer-bottom-links {\n  display: flex;\n  gap: 18px;\n}\n\n/* Responsive: new homepage sections */\n@media (max-width: 980px) {\n  .pain-grid {\n    grid-template-columns: 1fr;\n  }\n\n  .feature-showcase-row {\n    flex-direction: column !important;\n  }\n\n  .footer-grid {\n    grid-template-columns: 1fr 1fr;\n  }\n}\n\n@media (max-width: 640px) {\n  .pain-card {\n    flex-direction: column;\n    text-align: center;\n    gap: 8px;\n  }\n\n  .pain-arrow {\n    transform: rotate(90deg);\n  }\n\n  .footer-grid {\n    grid-template-columns: 1fr;\n  }\n\n  .footer-bottom {\n    flex-direction: column;\n    gap: 8px;\n  }\n\n  .final-cta-card {\n    padding: 40px 20px;\n  }\n\n  .integrations-grid {\n    gap: 12px;\n  }\n\n  .integration-item {\n    padding: 10px 14px;\n  }\n}\n\n/* Storefront inventory, detail, and checkout */\n\n.storefront-filter-shell {\n  margin-top: 18px;\n  background: white;\n  border: 1px solid var(--border);\n  border-radius: 24px;\n  box-shadow: var(--shadow);\n  padding: 16px;\n}\n\n.storefront-filter-grid {\n  display: grid;\n  grid-template-columns: repeat(3, minmax(0, 1fr)) 220px;\n  gap: 10px;\n  align-items: end;\n}\n\n.storefront-context-pills {\n  display: flex;\n  flex-wrap: wrap;\n  gap: 10px;\n}\n\n.storefront-context-pill {\n  display: inline-flex;\n  align-items: center;\n  min-height: 36px;\n  padding: 0 12px;\n  border-radius: 999px;\n  background: rgba(232, 89, 12, 0.08);\n  border: 1px solid rgba(232, 89, 12, 0.12);\n  color: var(--primary);\n  font-size: 13px;\n  font-weight: 700;\n}\n\n.storefront-empty-state {\n  text-align: center;\n  padding: 34px;\n}\n\n.storefront-detail-shell {\n  display: grid;\n  grid-template-columns: 1.05fr 0.95fr;\n  gap: 24px;\n}\n\n.storefront-gallery {\n  padding: 20px;\n}\n\n.storefront-gallery-main {\n  height: 420px;\n  border-radius: 24px;\n  background: radial-gradient(\n      circle at 20% 20%,\n      rgba(255, 255, 255, 0.65),\n      transparent 25%\n    ),\n    linear-gradient(135deg, #ffe8d4 0%, #ffcb96 55%, #ffd299 100%);\n}\n\n.storefront-thumb-grid {\n  display: grid;\n  grid-template-columns: repeat(4, minmax(0, 1fr));\n  gap: 12px;\n  margin-top: 14px;\n}\n\n.storefront-thumb {\n  height: 88px;\n  border-radius: 16px;\n  border: 1px solid var(--border);\n  background: linear-gradient(135deg, #fff8f3, #ffe9d6);\n}\n\n.storefront-summary-card {\n  border-radius: 24px;\n}\n\n.storefront-highlight-list {\n  display: grid;\n  gap: 12px;\n  margin-top: 18px;\n}\n\n.storefront-detail-section {\n  margin-top: 10px;\n}\n\n.storefront-detail-grid {\n  display: grid;\n  grid-template-columns: 1.1fr 0.9fr;\n  gap: 18px;\n}\n\n.storefront-checkout-shell {\n  display: grid;\n  grid-template-columns: 1.1fr 0.9fr;\n  gap: 24px;\n}\n\n/* ===== Operator Support System ===== */\n\n/* Welcome Modal */\n.welcome-overlay {\n  position: fixed;\n  inset: 0;\n  z-index: 200;\n  background: rgba(45, 31, 20, 0.6);\n  backdrop-filter: blur(4px);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  padding: 20px;\n}\n\n.welcome-modal {\n  background: var(--surface);\n  border-radius: 24px;\n  padding: 32px;\n  width: min(520px, 100%);\n  box-shadow: 0 32px 64px rgba(45, 31, 20, 0.24);\n  text-align: center;\n}\n\n.welcome-icon {\n  width: 56px;\n  height: 56px;\n  margin: 0 auto;\n  background: linear-gradient(135deg, #e8590c, #ff8c42);\n  border-radius: 16px;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  font-size: 26px;\n  color: white;\n}\n\n.welcome-header {\n  margin-bottom: 24px;\n}\n\n.welcome-actions {\n  display: grid;\n  gap: 10px;\n  text-align: left;\n  margin-bottom: 12px;\n}\n\n.welcome-tour-picks {\n  display: grid;\n  gap: 10px;\n  text-align: left;\n  margin-bottom: 16px;\n}\n\n.welcome-alt-actions {\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  gap: 10px;\n  font-size: 13px;\n}\n\n.welcome-alt-link {\n  color: var(--primary);\n  text-decoration: none;\n  font-weight: 600;\n  font-size: 13px;\n}\n\n.welcome-alt-link:hover {\n  text-decoration: underline;\n}\n\n.welcome-action-card {\n  display: block;\n  background: var(--surface);\n  border: 1px solid var(--border);\n  border-radius: 14px;\n  padding: 14px 16px;\n  cursor: pointer;\n  transition: border-color 0.15s ease;\n  font: inherit;\n  color: inherit;\n  text-decoration: none;\n  text-align: left;\n  width: 100%;\n}\n\n.welcome-action-card:hover {\n  border-color: var(--primary);\n}\n\n.welcome-action-card strong {\n  display: block;\n  font-size: 14px;\n  margin-bottom: 2px;\n}\n\n/* Setup Checklist */\n.checklist-card {\n  background: var(--surface);\n  border: 2px solid var(--primary);\n  border-radius: var(--radius);\n  padding: 20px;\n  box-shadow: 0 8px 24px rgba(232, 89, 12, 0.1);\n}\n\n.checklist-header {\n  display: flex;\n  align-items: flex-start;\n  justify-content: space-between;\n  gap: 12px;\n  margin-bottom: 12px;\n}\n\n.checklist-progress-bar {\n  height: 6px;\n  background: var(--surface-muted);\n  border-radius: 999px;\n  overflow: hidden;\n  margin-bottom: 16px;\n}\n\n.checklist-progress-fill {\n  height: 100%;\n  background: linear-gradient(90deg, var(--primary), var(--accent));\n  border-radius: 999px;\n  transition: width 0.4s ease;\n}\n\n.checklist-list {\n  display: grid;\n  gap: 6px;\n}\n\n.checklist-item {\n  display: flex;\n  align-items: center;\n  gap: 12px;\n  padding: 10px 12px;\n  border-radius: 12px;\n  text-decoration: none;\n  color: inherit;\n  transition: background 0.12s ease;\n}\n\n.checklist-item:hover {\n  background: var(--surface-muted);\n}\n\n.checklist-item-done {\n  opacity: 0.55;\n}\n\n.checklist-check {\n  width: 28px;\n  height: 28px;\n  border-radius: 50%;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  font-size: 12px;\n  font-weight: 700;\n  flex-shrink: 0;\n  background: var(--surface-muted);\n  color: var(--text-soft);\n}\n\n.checklist-item-done .checklist-check {\n  background: var(--success);\n  color: white;\n}\n\n.checklist-go {\n  color: var(--primary);\n  font-size: 13px;\n  font-weight: 600;\n  white-space: nowrap;\n}\n\n.checklist-milestone {\n  background: linear-gradient(135deg, #eaf9f4, #d0f0e4);\n  border: 1px solid #b8e6d4;\n  border-radius: 12px;\n  padding: 14px 16px;\n  margin-bottom: 12px;\n  font-size: 14px;\n  color: #188862;\n  line-height: 1.5;\n}\n\n/* Context Help Banner */\n.help-banner {\n  display: flex;\n  align-items: flex-start;\n  gap: 12px;\n  background: linear-gradient(135deg, #fdeee3, #fff8f3);\n  border: 1px solid rgba(232, 89, 12, 0.15);\n  border-radius: var(--radius);\n  padding: 14px 16px;\n  margin-bottom: 16px;\n}\n\n/* Guided Tour */\n.tour-overlay {\n  position: fixed;\n  inset: 0;\n  z-index: 300;\n  background: rgba(45, 31, 20, 0.45);\n  pointer-events: auto;\n}\n\n.tour-highlight {\n  position: absolute;\n  border-radius: 12px;\n  box-shadow: 0 0 0 4000px rgba(45, 31, 20, 0.45);\n  border: 2px solid var(--primary);\n  z-index: 301;\n  pointer-events: none;\n}\n\n.tour-tooltip {\n  position: absolute;\n  z-index: 302;\n  background: var(--surface);\n  border-radius: 16px;\n  padding: 18px;\n  box-shadow: 0 20px 50px rgba(45, 31, 20, 0.2);\n  border: 1px solid var(--border);\n}\n\n/* Copilot FAB */\n.copilot-fab {\n  position: fixed;\n  bottom: 24px;\n  right: 24px;\n  z-index: 100;\n  width: 52px;\n  height: 52px;\n  border-radius: 50%;\n  background: linear-gradient(135deg, #e8590c, #ff8c42);\n  color: white;\n  border: none;\n  font-size: 22px;\n  cursor: pointer;\n  box-shadow: 0 8px 24px rgba(232, 89, 12, 0.35);\n  transition: transform 0.15s ease, box-shadow 0.15s ease;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n}\n\n.copilot-fab:hover {\n  transform: scale(1.08);\n  box-shadow: 0 12px 32px rgba(232, 89, 12, 0.45);\n}\n\n/* Copilot Panel */\n.copilot-panel {\n  position: fixed;\n  bottom: 88px;\n  right: 24px;\n  z-index: 101;\n  width: min(400px, calc(100vw - 48px));\n  height: min(540px, calc(100vh - 140px));\n  background: var(--surface);\n  border: 1px solid var(--border);\n  border-radius: 20px;\n  box-shadow: 0 24px 64px rgba(45, 31, 20, 0.18);\n  display: flex;\n  flex-direction: column;\n  overflow: hidden;\n}\n\n.copilot-panel-header {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  padding: 14px 16px;\n  border-bottom: 1px solid var(--border);\n}\n\n.copilot-messages {\n  flex: 1;\n  overflow-y: auto;\n  padding: 14px;\n  display: flex;\n  flex-direction: column;\n  gap: 10px;\n}\n\n.copilot-empty {\n  flex: 1;\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  justify-content: center;\n  padding: 24px;\n  text-align: center;\n}\n\n.copilot-msg {\n  max-width: 90%;\n}\n\n.copilot-msg-user {\n  align-self: flex-end;\n}\n\n.copilot-msg-assistant {\n  align-self: flex-start;\n}\n\n.copilot-msg-content {\n  padding: 10px 14px;\n  border-radius: 14px;\n  font-size: 13px;\n  line-height: 1.5;\n}\n\n.copilot-msg-user .copilot-msg-content {\n  background: var(--primary);\n  color: white;\n}\n\n.copilot-msg-assistant .copilot-msg-content {\n  background: var(--surface-muted);\n  color: var(--text);\n}\n\n.copilot-prompts {\n  display: flex;\n  flex-wrap: wrap;\n  gap: 6px;\n  padding: 0 14px 10px;\n}\n\n.copilot-prompt-chip {\n  background: var(--surface-muted);\n  border: 1px solid var(--border);\n  border-radius: 999px;\n  padding: 6px 12px;\n  font-size: 12px;\n  font-weight: 500;\n  cursor: pointer;\n  transition: border-color 0.12s ease;\n  font: inherit;\n  color: var(--text);\n}\n\n.copilot-prompt-chip:hover {\n  border-color: var(--primary);\n  color: var(--primary);\n}\n\n.copilot-input-row {\n  display: flex;\n  gap: 8px;\n  padding: 12px 14px;\n  border-top: 1px solid var(--border);\n}\n\n.copilot-input-row input {\n  min-height: 38px;\n  font-size: 13px;\n}\n\n@media (max-width: 980px) {\n  .category-photo-grid {\n    grid-template-columns: repeat(2, minmax(0, 1fr));\n  }\n\n  .storefront-filter-grid,\n  .storefront-detail-shell,\n  .storefront-detail-grid,\n  .storefront-checkout-shell {\n    grid-template-columns: 1fr;\n  }\n\n  .public-hero {\n    min-height: 520px;\n  }\n\n  .storefront-search-grid {\n    grid-template-columns: repeat(2, minmax(0, 1fr));\n  }\n\n  .storefront-search-btn {\n    grid-column: 1 / -1;\n  }\n\n  .public-nav-desktop {\n    display: none;\n  }\n\n  .public-nav-right {\n    display: none;\n  }\n\n  .saas-header-nav {\n    display: none;\n  }\n\n  .mobile-menu-btn {\n    display: flex;\n  }\n\n  .mobile-header-controls {\n    display: flex;\n  }\n}\n\n@media (max-width: 640px) {\n  .category-photo-grid {\n    grid-template-columns: repeat(2, minmax(0, 1fr));\n  }\n\n  .trust-items {\n    gap: 20px 24px;\n  }\n\n  .storefront-thumb-grid {\n    grid-template-columns: repeat(2, minmax(0, 1fr));\n  }\n\n  .public-hero {\n    min-height: 0;\n  }\n\n  .public-hero-overlay {\n    background: linear-gradient(\n      180deg,\n      rgba(255, 255, 255, 0.92) 0%,\n      rgba(255, 255, 255, 0.8) 35%,\n      rgba(255, 255, 255, 0.3) 70%,\n      transparent 100%\n    );\n  }\n\n  .public-hero-copy {\n    width: auto;\n    padding: 20px 16px;\n    margin: 14px 0;\n    background: rgba(255, 255, 255, 0.45);\n    border-radius: 20px;\n  }\n\n  .storefront-search-card {\n    margin-top: 14px;\n    padding: 12px;\n    border-radius: 16px;\n  }\n\n  .storefront-search-grid {\n    gap: 10px;\n  }\n\n  .storefront-field input,\n  .storefront-field select,\n  .storefront-search-btn {\n    min-height: 44px;\n  }\n\n  .team-invite-grid {\n    grid-template-columns: 1fr;\n    align-items: stretch;\n  }\n\n  .team-invite-grid > * {\n    min-width: 0;\n  }\n\n  .team-invite-submit {\n    width: 100%;\n  }\n\n  .storefront-search-grid {\n    grid-template-columns: 1fr;\n  }\n\n  .storefront-search-btn {\n    grid-column: auto;\n  }\n\n  .public-hero-photo {\n    object-position: center center;\n  }\n\n  .public-hero-copy h1 {\n    font-size: clamp(2rem, 11vw, 2.5rem);\n    line-height: 0.98;\n  }\n\n  .public-hero-copy p {\n    font-size: 0.98rem;\n    line-height: 1.5;\n  }\n\n  .saas-header {\n    padding-inline: 14px !important;\n  }\n}\n\n@media (max-width: 420px) {\n  .public-hero-copy {\n    padding: 16px 12px;\n    margin: 12px 0;\n  }\n\n  .storefront-search-card {\n    padding: 10px;\n    border-radius: 14px;\n  }\n}\n\n/* Command Palette */\n.cmd-palette-overlay {\n  position: fixed;\n  inset: 0;\n  z-index: 900;\n  background: rgba(45, 31, 20, 0.45);\n  backdrop-filter: blur(6px);\n  display: flex;\n  justify-content: center;\n  align-items: flex-start;\n  padding-top: 18vh;\n  animation: cmd-fade-in 0.15s ease;\n}\n\n@keyframes cmd-fade-in {\n  from {\n    opacity: 0;\n  }\n  to {\n    opacity: 1;\n  }\n}\n\n.cmd-palette {\n  width: min(580px, calc(100% - 32px));\n  background: var(--surface);\n  border: 1px solid var(--border);\n  border-radius: var(--radius);\n  box-shadow: 0 24px 64px rgba(45, 31, 20, 0.22);\n  overflow: hidden;\n  animation: cmd-slide-in 0.15s ease;\n}\n\n@keyframes cmd-slide-in {\n  from {\n    opacity: 0;\n    transform: translateY(-8px) scale(0.98);\n  }\n  to {\n    opacity: 1;\n    transform: translateY(0) scale(1);\n  }\n}\n\n.cmd-palette-input-wrap {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  padding: 14px 18px;\n  border-bottom: 1px solid var(--border);\n}\n\n.cmd-palette-input {\n  flex: 1;\n  border: none !important;\n  outline: none !important;\n  box-shadow: none !important;\n  background: transparent;\n  font-size: 1.1rem;\n  color: var(--text);\n  min-height: auto;\n  padding: 0;\n}\n\n.cmd-palette-input::placeholder {\n  color: var(--text-soft);\n}\n\n.cmd-palette-esc {\n  font-size: 11px;\n  font-weight: 600;\n  padding: 3px 7px;\n  border-radius: 6px;\n  background: var(--surface-muted);\n  border: 1px solid var(--border);\n  color: var(--text-soft);\n  font-family: inherit;\n  line-height: 1;\n  flex-shrink: 0;\n}\n\n.cmd-palette-list {\n  max-height: 340px;\n  overflow-y: auto;\n  padding: 8px;\n}\n\n.cmd-palette-section {\n  font-size: 0.72rem;\n  font-weight: 700;\n  text-transform: uppercase;\n  letter-spacing: 0.05em;\n  color: var(--text-soft);\n  padding: 10px 10px 4px;\n}\n\n.cmd-palette-item {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  gap: 10px;\n  width: 100%;\n  padding: 10px 10px;\n  border: none;\n  border-radius: 10px;\n  background: transparent;\n  color: var(--text);\n  font-size: 14px;\n  font-weight: 500;\n  cursor: pointer;\n  transition: background 0.1s ease;\n  text-align: left;\n}\n\n.cmd-palette-item:hover,\n.cmd-palette-item-active {\n  background: rgba(232, 89, 12, 0.08);\n}\n\n.cmd-palette-item-label {\n  flex: 1;\n  min-width: 0;\n  overflow: hidden;\n  text-overflow: ellipsis;\n  white-space: nowrap;\n}\n\n.cmd-palette-kbd {\n  font-size: 11px;\n  font-weight: 600;\n  padding: 2px 6px;\n  border-radius: 5px;\n  background: var(--surface-muted);\n  border: 1px solid var(--border);\n  color: var(--text-soft);\n  font-family: inherit;\n  line-height: 1;\n}\n\n.cmd-palette-empty {\n  padding: 28px 10px;\n  text-align: center;\n  color: var(--text-soft);\n  font-size: 14px;\n}\n\n/* Notification Center */\n.notif-center {\n  position: relative;\n}\n\n.notif-bell-btn {\n  position: relative;\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  width: 40px;\n  height: 40px;\n  border-radius: 12px;\n  border: 1px solid var(--border);\n  background: var(--surface);\n  color: var(--text-soft);\n  cursor: pointer;\n  transition: border-color 0.15s ease, color 0.15s ease, box-shadow 0.15s ease;\n}\n\n.notif-bell-btn:hover {\n  border-color: var(--primary);\n  color: var(--primary);\n  box-shadow: 0 0 0 3px rgba(232, 89, 12, 0.1);\n}\n\n.notif-badge {\n  position: absolute;\n  top: -4px;\n  right: -4px;\n  min-width: 18px;\n  height: 18px;\n  padding: 0 5px;\n  border-radius: 999px;\n  background: var(--danger);\n  color: white;\n  font-size: 11px;\n  font-weight: 700;\n  line-height: 18px;\n  text-align: center;\n  pointer-events: none;\n}\n\n.notif-dropdown {\n  position: absolute;\n  top: calc(100% + 8px);\n  right: 0;\n  width: 380px;\n  background: var(--surface);\n  border: 1px solid var(--border);\n  border-radius: var(--radius);\n  box-shadow: 0 20px 50px rgba(45, 31, 20, 0.16);\n  z-index: 100;\n  opacity: 0;\n  transform: translateY(-6px) scale(0.97);\n  pointer-events: none;\n  transition: opacity 0.18s ease, transform 0.18s ease;\n}\n\n.notif-dropdown-open {\n  opacity: 1;\n  transform: translateY(0) scale(1);\n  pointer-events: auto;\n}\n\n.notif-dropdown-header {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  padding: 14px 16px;\n  border-bottom: 1px solid var(--border);\n}\n\n.notif-dropdown-title {\n  font-size: 14px;\n  font-weight: 700;\n  color: var(--text);\n}\n\n.notif-mark-all-btn {\n  background: none;\n  border: none;\n  color: var(--primary);\n  font-size: 12px;\n  font-weight: 600;\n  cursor: pointer;\n  padding: 4px 8px;\n  border-radius: 8px;\n  transition: background 0.12s ease;\n}\n\n.notif-mark-all-btn:hover {\n  background: rgba(232, 89, 12, 0.08);\n}\n\n.notif-dropdown-body {\n  max-height: 380px;\n t-weight: 600;\n  color: var(--text);\n  margin: 0 0 12px;\n}\n\n.svc-map-popup {\n  font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Arial, Helvetica,\n    sans-serif;\n  line-height: 1.5;\n  color: var(--text);\n}\n\n/* ── Copilot Action Preview ── */\n\n.copilot-action-preview {\n  border: 1px solid var(--border);\n  border-radius: calc(var(--radius) / 2);\n  padding: 12px;\n  margin: 8px 12px;\n  background: var(--surface);\n  box-shadow: var(--shadow);\n}\n\n.copilot-action-field-label {\n  font-size: 11px;\n  font-weight: 600;\n  text-transform: uppercase;\n  letter-spacing: 0.04em;\n  color: var(--primary);\n  margin-bottom: 6px;\n}\n\n.copilot-action-diff {\n  margin-bottom: 10px;\n}\n\n.copilot-action-diff-new {\n  background: var(--surface-muted);\n  border: 1px solid var(--border);\n  border-radius: calc(var(--radius) / 3);\n  padding: 8px 10px;\n}\n\n.copilot-action-diff-label {\n  font-size: 10px;\n  font-weight: 600;\n  text-transform: uppercase;\n  letter-spacing: 0.04em;\n  color: var(--text-soft);\n  margin-bottom: 4px;\n}\n\n.copilot-action-current {\n  background: color-mix(in srgb, var(--text-soft) 6%, var(--surface));\n  border: 1px solid var(--border);\n  border-radius: calc(var(--radius) / 3);\n  padding: 8px 10px;\n  margin-bottom: 6px;\n  opacity: 0.75;\n}\n\n.copilot-action-proposed {\n  background: var(--surface-muted);\n  border: 1px solid var(--border);\n  border-left: 3px solid var(--accent);\n  border-radius: calc(var(--radius) / 3);\n  padding: 8px 10px;\n}\n\n.copilot-action-label {\n  font-size: 10px;\n  font-weight: 600;\n  text-transform: uppercase;\n  letter-spacing: 0.04em;\n  color: var(--text-soft);\n  margin-bottom: 4px;\n}\n\n.copilot-action-empty {\n  font-size: 13px;\n  font-style: italic;\n  color: var(--text-soft);\n}\n\n.copilot-action-diff pre {\n  margin: 0;\n  white-space: pre-wrap;\n  word-break: break-word;\n  font-size: 13px;\n  line-height: 1.5;\n  font-family: inherit;\n  color: var(--text);\n}\n\n.
